<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 계산기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <main class="card">
            <h1>BMI 계산기</h1>

            <form method="post" class="form">
                <label for="height">키 (cm)</label>
                <input type="number" step="0.1" id="height" name="height" value="{{ request.form.get('height', '') }}" required>

                <label for="weight">몸무게 (kg)</label>
                <input type="number" step="0.1" id="weight" name="weight" value="{{ request.form.get('weight', '') }}" required>

                <button type="submit">계산하기</button>
            </form>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            {% if result %}
            <section class="result">
                <div class="result-row">
                    <span class="label">BMI 지수</span>
                    <span class="value">{{ result.bmi }}</span>
                </div>
                <div class="result-row">
                    <span class="label">체중 상태</span>
                    <span class="value badge badge-{{ result.category }}">{{ result.category }}</span>
                </div>

                <h2>건강 관리 조언</h2>
                <ul class="advice-list">
                    {% for tip in result.advice %}
                    <li>{{ tip }}</li>
                    {% endfor %}
                </ul>
            </section>
            {% endif %}
        </main>
    </div>
</body>
</html>
